name: CD

on:
  # Temporarily disabled while release/install strategy is refocused.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish assets to (e.g. gitTUIt-v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build linux binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Package linux tarball
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          mkdir -p dist/package
          install -m 755 "target/x86_64-unknown-linux-musl/release/gitTUIt" "dist/package/gitTUIt"
          cp README.md LICENSE dist/package/
          tar -czf "dist/gitTUIt-${tag}-linux-x86_64.tar.gz" -C dist/package .

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-macos-aarch64

      - name: Build macOS arm64 binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package macOS tarball
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          mkdir -p dist/package
          install -m 755 "target/aarch64-apple-darwin/release/gitTUIt" "dist/package/gitTUIt"
          cp README.md LICENSE dist/package/
          tar -czf "dist/gitTUIt-${tag}-macos-aarch64.tar.gz" -C dist/package .

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-windows-x86_64

      - name: Build windows binary
        run: cargo build --release --locked

      - name: Package windows zip
        shell: pwsh
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path dist\package | Out-Null
          Copy-Item "target\release\gitTUIt.exe" "dist\package\gitTUIt.exe" -Force
          Copy-Item "README.md" "dist\package\README.md" -Force
          Copy-Item "LICENSE" "dist\package\LICENSE" -Force
          Compress-Archive -Path "dist\package\*" -DestinationPath "dist\gitTUIt-$tag-windows-x86_64.zip" -Force

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset -y

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build windows msi
        shell: pwsh
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          cargo wix --version
          cargo wix --no-build --nocapture --output "dist\gitTUIt-$tag-windows-x86_64.msi"

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: dist/*

  publish-release-assets:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows
    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: dist

      - name: Verify release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "${{ steps.tag.outputs.value }}" --repo "${GITHUB_REPOSITORY}"

      - name: Generate checksums
        run: |
          set -euo pipefail
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.tag.outputs.value }}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
