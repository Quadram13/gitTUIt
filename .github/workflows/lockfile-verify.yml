name: Lockfile Verify

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lockfile-verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Regenerate lockfile metadata
        run: cargo metadata --format-version=1 > /dev/null

      - name: Ensure Cargo.lock is up to date
        shell: bash
        run: |
          if ! git diff --quiet -- Cargo.lock; then
            echo "::error::Cargo.lock is out of date. Regenerate it and commit the result."
            git --no-pager diff -- Cargo.lock
            exit 1
          fi
          echo "Cargo.lock is in sync."
