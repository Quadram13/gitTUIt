name: Release PR Lock Sync

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-pr-lock-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether PR is a release PR
        id: guard
        shell: bash
        run: |
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: PR head is from a different repository."
            exit 0
          fi
          if [[ "${{ github.event.pull_request.title }}" =~ ^chore:\ release ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release PR branch
        if: steps.guard.outputs.is_release == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust toolchain
        if: steps.guard.outputs.is_release == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Refresh lockfile
        if: steps.guard.outputs.is_release == 'true'
        run: cargo metadata --format-version=1 > /dev/null

      - name: Commit and push lockfile updates
        if: steps.guard.outputs.is_release == 'true'
        shell: bash
        run: |
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already in sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore(repo): sync Cargo.lock for release PR"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: No-op for non-release PRs
        if: steps.guard.outputs.is_release != 'true'
        run: echo "Non-release PR detected; lock sync check passes with no-op."
